[tool.black]
line-length = 100
target-version = ["py311"]
include = '\.pyi?$'
exclude = '''
/(
    \.git
  | \.venv
  | venv
  | node_modules
  | frontend
)/
'''

[tool.ruff]
line-length = 100
target-version = "py311"
src = ["src", "tests"]
exclude = ["frontend", ".venv", "venv"]

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP"]
ignore = ["E501"]

[tool.ruff.lint.isort]
known-first-party = ["src"]

[tool.mypy]
python_version = "3.11"
ignore_missing_imports = true
disallow_untyped_defs = false
exclude = ["frontend", "tests"]

[tool.pytest.ini_options]
pythonpath = ["."]
testpaths = ["tests"]
